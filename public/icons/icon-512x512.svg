<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sakuraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb7c5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8547a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="8" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="100" fill="#fdf8f5"/>
  
  <!-- Outer glowing circle -->
  <circle cx="256" cy="256" r="180" fill="#e8547a" opacity="0.05"/>
  
  <g transform="translate(256, 230)" filter="url(#shadow)">
    <!-- Sakura Petals -->
    <path d="M0,0 C-40,-80 40,-80 0,0" fill="url(#sakuraGrad)" transform="rotate(0) translate(0,-30)"/>
    <path d="M0,0 C-40,-80 40,-80 0,0" fill="url(#sakuraGrad)" transform="rotate(72) translate(0,-30)"/>
    <path d="M0,0 C-40,-80 40,-80 0,0" fill="url(#sakuraGrad)" transform="rotate(144) translate(0,-30)"/>
    <path d="M0,0 C-40,-80 40,-80 0,0" fill="url(#sakuraGrad)" transform="rotate(216) translate(0,-30)"/>
    <path d="M0,0 C-40,-80 40,-80 0,0" fill="url(#sakuraGrad)" transform="rotate(288) translate(0,-30)"/>
    
    <!-- Flower Center -->
    <circle r="15" fill="#fbc531"/>
    <circle r="8" fill="#e67e22"/>
  </g>
  
  <text x="256" y="420" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" fill="#e8547a" text-anchor="middle" font-weight="900" style="letter-spacing: 2px;">SAKURA</text>
  <text x="256" y="465" font-family="serif" font-size="28" fill="#bc4665" text-anchor="middle" font-weight="bold" opacity="0.8">NIHONGO</text>
</svg>